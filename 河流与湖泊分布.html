<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>马来西亚河流地理测验</title>
    <style>
        /* 基础页面样式 */
        body { 
            font-family: 'Microsoft YaHei', sans-serif; 
            text-align: center; 
            background-color: #f4f7f6; 
            margin: 0;
            padding: 20px;
        }

        #game-container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        h1 { color: #2c3e50; }

        /* 问题框样式 */
        #question-box { 
            font-size: 24px; 
            color: #333; 
            margin-bottom: 10px; 
            padding: 15px; 
            background: #e3f2fd; 
            border-radius: 10px; 
            border: 2px solid #bbdefb;
            min-height: 40px;
        }

        /* 计时器样式 */
        #timer-box { 
            font-size: 22px; 
            color: #d35400; 
            margin-bottom: 20px; 
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace; 
        }

        /* 按钮样式 */
        #start-btn { 
            padding: 12px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 5px;
            transition: background 0.3s;
        }
        #start-btn:hover { background-color: #2980b9; }

        /* SVG 地图交互样式 */
        .clickable { 
            cursor: pointer; 
            transition: stroke 0.3s, stroke-width 0.3s; 
        }
        .clickable:hover { 
            stroke: #f1c40f !important; 
            stroke-width: 6px !important; 
        }

        /* 游戏结束的大标题 */
        .success { 
            color: #27ae60; 
            font-weight: bold; 
            font-size: 28px; 
        }

        #map-viewport {
            margin-top: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
            overflow: hidden;
            background-color: #fafafa;
        }

        /* 响应式：确保地图不会超出屏幕 */
        svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>🇲🇾 马来西亚河流地理测验</h1>
    
    <div id="question-box">准备好了吗？点击下方按钮开始！</div>
    
    <div id="timer-box">时间: 0.0 秒</div>
    
    <button id="start-btn" onclick="startGame()">开始游戏挑战</button>

    <div id="map-viewport">

<script>
    // 题目数据：ID 必须与 SVG 中的 path id 完全一致
    const quizData = [
        { id: "pilihe", name: "霹雳河 (Sungai Perak)" },
        { id: "mudahe", name: "姆达河 (Sungai Muda)" },
        { id: "bennanhe", name: "本南河 (Sungai Bernam)" },
        { id: "penghenghe", name: "彭亨河 (Sungai Pahang)" },
        { id: "jilandanhe", name: "吉兰丹河 (Sungai Kelantan)" },
        { id: "dengjialouhe", name: "登嘉楼河 (Sungai Terengganu)" },
        { id: "gelehe", name: "哥乐河 (Sungai Golok)" },
        { id: "bailehu", name: "百乐湖 (Tasik Bera)" },
        { id: "zhennihu", name: "珍尼湖 (Tasik Chini)" },
        { id: "kenyihu", name: "肯逸湖 (Tasik Kenyir)" },
        { id: "jingnabadaanhe", name: "京那峇达岸河 (Sungai Kinabatangan)" },
        { id: "larangjiang", name: "拉让江 (Sungai Rajang)" }
    ];

    let currentStep = 0;
    let gameStarted = false;
    let startTime;
    let timerInterval;

    // 开始游戏
    function startGame() {
        currentStep = 0;
        gameStarted = true;
        
        // 隐藏按钮
        document.getElementById('start-btn').style.display = 'none';
        
        // 重置所有河流颜色（防止重玩时颜色还在）
        const allPaths = document.querySelectorAll('.clickable');
        allPaths.forEach(p => {
            p.style.stroke = ""; 
            p.style.fill = "";
        });

        // 启动计时器
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 100);
        
        showQuestion();
    }

    // 更新时间显示
    function updateTimer() {
        if (!gameStarted) return;
        const timeElapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('timer-box').innerText = `时间: ${timeElapsed} 秒`;
    }

    // 显示题目
    function showQuestion() {
        if (currentStep < quizData.length) {
            document.getElementById('question-box').innerHTML = 
                `请找出：<span style="color:#e74c3c; font-weight:bold;">${quizData[currentStep].name}</span>`;
        } else {
            endGame();
        }
    }

    // 游戏结束
    function endGame() {
        gameStarted = false;
        clearInterval(timerInterval);
        
        const finalTime = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('question-box').innerHTML = 
            `<span class="success">🏆 恭喜完成！总用时: ${finalTime} 秒</span>`;
        
        document.getElementById('start-btn').style.display = 'inline-block';
        document.getElementById('start-btn').innerText = '重新挑战';
    }

    // 点击事件监听
    document.addEventListener('click', function(e) {
        if (!gameStarted) return;

        // 检查点击的对象是否有 ID
        const clickedId = e.target.id;

        if (clickedId === quizData[currentStep].id) {
            // 答对了
            const target = e.target;
            target.style.stroke = "#3498db"; // 变蓝色
            target.style.strokeWidth = "5px";
            
            // 如果是湖泊（闭合图形），填充颜色
            if (target.tagName === 'ellipse' || target.tagName === 'circle' || clickedId.includes('hu')) {
                target.style.fill = "#3498db";
            }

            currentStep++;
            showQuestion();
        } else if (clickedId && clickedId.startsWith('MY')) {
            // 如果点到了州属背景，不计分但可以在控制台提示
            console.log("点到了州属背景: " + clickedId);
        }
    });
</script>
